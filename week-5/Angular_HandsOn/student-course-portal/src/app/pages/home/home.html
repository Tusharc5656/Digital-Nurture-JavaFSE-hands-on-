<!-- Home Template (Hands-On 1 & 2): Demonstrates all four data binding types -->

<!-- 1. Interpolation Binding: {{ expression }} -->
<div class="container">
  <section class="hero">
    <h1>{{ title }}</h1>
    <p class="hero-subtitle">Track your courses, manage enrollments, and monitor your academic progress.</p>
  </section>

  <!-- 2. Two-way Binding: [(ngModel)] — DOM <-> Component -->
  <div class="search-bar">
    <input
      class="form-input"
      type="text"
      [(ngModel)]="searchTerm"
      placeholder="Search courses... (two-way binding demo)" />
    <p class="search-hint" *ngIf="searchTerm">You typed: <strong>{{ searchTerm }}</strong></p>
  </div>

  <!-- Dashboard Stats Cards -->
  <div class="stats-grid" *ngIf="isLoaded">
    <div class="glass-card stat-card">
      <span class="stat-icon">📚</span>
      <div class="stat-info">
        <h3>{{ coursesAvailable }}</h3>
        <p>Courses Available</p>
      </div>
    </div>
    <div class="glass-card stat-card">
      <span class="stat-icon">✅</span>
      <div class="stat-info">
        <h3>{{ enrolledCount }}</h3>
        <p>Enrolled</p>
      </div>
    </div>
    <div class="glass-card stat-card">
      <span class="stat-icon">🏆</span>
      <div class="stat-info">
        <h3>{{ gpa }}</h3>
        <p>Current GPA</p>
      </div>
    </div>
  </div>

  <!-- Loading Skeleton -->
  <div class="stats-grid" *ngIf="!isLoaded">
    <div class="glass-card stat-card skeleton" *ngFor="let i of [1,2,3]">
      <div class="skeleton-circle"></div>
      <div class="skeleton-lines">
        <div class="skeleton-line short"></div>
        <div class="skeleton-line"></div>
      </div>
    </div>
  </div>

  <!-- 3. Property Binding: [disabled] & 4. Event Binding: (click) -->
  <div class="actions">
    <button class="btn btn-primary" (click)="onRefresh()" [disabled]="!isLoaded">
      🔄 Refresh Dashboard
    </button>
    <a class="btn btn-secondary" routerLink="/courses">Browse Courses →</a>
  </div>
</div>
