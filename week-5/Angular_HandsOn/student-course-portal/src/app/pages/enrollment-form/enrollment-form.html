<!-- Template-Driven Enrollment Form (Hands-On 4) -->
<div class="container">
  <div class="page-header">
    <h1>Course Enrollment</h1>
    <p class="page-subtitle">Fill in the form to request a course enrollment.</p>
  </div>

  <div class="form-wrapper glass-card">
    <!-- Success Message -->
    <div class="success-banner" *ngIf="successMessage">{{ successMessage }}</div>

    <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm.valid)" novalidate>

      <!-- Student Name -->
      <div class="form-group">
        <label class="form-label" for="studentName">Student Name *</label>
        <input id="studentName" class="form-input"
          name="studentName"
          [(ngModel)]="student.name"
          required minlength="3"
          #nameField="ngModel"
          [class.ng-invalid]="nameField.invalid && (nameField.touched || submitted)"
          placeholder="Enter your full name" />
        <span class="error-text" *ngIf="nameField.invalid && (nameField.touched || submitted)">
          <span *ngIf="nameField.errors?.['required']">Name is required.</span>
          <span *ngIf="nameField.errors?.['minlength']">Name must be at least 3 characters.</span>
        </span>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="studentEmail">Email Address *</label>
        <input id="studentEmail" class="form-input"
          type="email" name="studentEmail"
          [(ngModel)]="student.email"
          required email
          #emailField="ngModel"
          placeholder="Enter your email" />
        <span class="error-text" *ngIf="emailField.invalid && (emailField.touched || submitted)">
          <span *ngIf="emailField.errors?.['required']">Email is required.</span>
          <span *ngIf="emailField.errors?.['email']">Please enter a valid email address.</span>
        </span>
      </div>

      <!-- Course Selection -->
      <div class="form-group">
        <label class="form-label" for="courseId">Select Course *</label>
        <select id="courseId" class="form-input"
          name="courseId"
          [(ngModel)]="student.courseId"
          required
          #courseField="ngModel">
          <option value="">-- Select a Course --</option>
          <option *ngFor="let c of availableCourses" [value]="c.id">{{ c.name }} ({{ c.id }})</option>
        </select>
        <span class="error-text" *ngIf="courseField.invalid && (courseField.touched || submitted)">
          Please select a course.
        </span>
      </div>

      <!-- Agree to Terms -->
      <div class="form-group checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" name="agreeToTerms"
            [(ngModel)]="student.agreeToTerms"
            required #termsField="ngModel" />
          I agree to the enrollment terms and conditions *
        </label>
        <span class="error-text" *ngIf="termsField.invalid && (termsField.touched || submitted)">
          You must agree to the terms.
        </span>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Submit Enrollment</button>
        <button type="button" class="btn btn-secondary" (click)="onReset()">Reset</button>
      </div>
    </form>
  </div>
</div>
