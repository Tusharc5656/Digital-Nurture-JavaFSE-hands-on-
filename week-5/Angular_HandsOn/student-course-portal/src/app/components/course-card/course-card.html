<!-- CourseCard Template: demonstrates property binding, event binding, ngClass, ngStyle, custom pipe, and custom directive -->
<div class="glass-card course-card" appHighlight highlightColor="#6366f1">
  <div class="card-header">
    <span class="course-code">{{ course.code }}</span>
    <span class="badge" [ngClass]="getGradeBadgeClass()">{{ course.gradeStatus }}</span>
  </div>
  <h3 class="course-name">{{ course.name }}</h3>
  <p class="course-dept">{{ course.department }}</p>
  <!-- [ngStyle] for dynamic styling based on credits -->
  <p class="course-credits" [ngStyle]="{ 'font-weight': course.credits >= 4 ? '700' : '400' }">
    {{ course.credits | creditLabel }}
  </p>
  <p class="course-desc" *ngIf="course.description">{{ course.description }}</p>
  <button
    class="btn btn-primary enroll-btn"
    (click)="onEnroll()"
    [disabled]="isEnrolled || course.gradeStatus !== 'Pending'">
    {{ isEnrolled ? '✓ Enrolled' : 'Enroll Now' }}
  </button>
</div>
