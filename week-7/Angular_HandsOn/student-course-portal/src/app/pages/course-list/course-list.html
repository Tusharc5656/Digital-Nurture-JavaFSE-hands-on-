<!-- CourseList Template: Hands-On 2, 3, 6, 7, 9 -->
<div class="container">
  <div class="header-section">
    <h2>Available Courses</h2>
    <p>Browse and select courses to enroll for the upcoming semester.</p>
  </div>

  <!-- Summary Widget sharing CourseService singleton (Hands-On 6) -->
  <app-course-summary-widget></app-course-summary-widget>

  <!-- Search & Query Param Input (Hands-On 7) -->
  <div class="search-box">
    <input
      type="text"
      class="form-input"
      [(ngModel)]="searchTerm"
      (ngModelChange)="onSearchChange()"
      placeholder="Filter courses by name or code..." />
  </div>

  <!-- Loading State with *ngIf -->
  <div *ngIf="isLoading" class="loading-container">
    <p>Loading courses...</p>
  </div>

  <!-- Course Grid when loaded -->
  <div *ngIf="!isLoading">
    <div
      class="courses-grid"
      *ngIf="(courses$ | async)?.length; else noCourses">
      <app-course-card
        *ngFor="let course of (courses$ | async); let i = index; trackBy: trackByCourseId"
        [course]="course"
        (enrollRequested)="onEnroll($event)">
      </app-course-card>
    </div>
  </div>

  <!-- ng-template #noCourses fallback (Hands-On 3) -->
  <ng-template #noCourses>
    <div class="empty-state">
      <p>No courses available.</p>
    </div>
  </ng-template>

  <!-- Selected Course ID Display (Hands-On 2) -->
  <div class="selected-info" *ngIf="selectedCourseId">
    <p>Selected course ID: {{ selectedCourseId }}</p>
  </div>
</div>
